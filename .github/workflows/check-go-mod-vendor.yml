# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go mod tidy and vendor

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Tidy
        run: go mod tidy

      - name: Vendor
        run: go mod vendor

      - name: Check for diff
        run: |
          if ! git diff --exit-code; then
            echo "::error::go mod tidy/vendor produced changes. Run 'go mod tidy && go mod vendor' locally and commit the results."
            exit 1
          fi
